<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ULTRACANALES — Todos los Canales</title>
    <meta name="theme-color" content="#0a0a0b">
    <meta name="description" content="Más de 8,000 canales en vivo — deportes, noticias, entretenimiento y más">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./canales-style.css?v=20260414">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3612607805789879" crossorigin="anonymous"></script>
</head>
<body>

<!-- HEADER -->
<header class="cn-header">
    <div class="cn-header-inner">
        <div class="cn-header-left">
            <a href="./index.html" class="cn-logo-link">
                <img src="./attached_assets/297938-removebg-preview_1760222866015.png" alt="ULTRACANALES" class="cn-logo-img">
            </a>
            <div class="cn-breadcrumb">
                <a href="./index.html">Inicio</a>
                <span>›</span>
                <span>Todos los Canales</span>
            </div>
        </div>
        <div class="cn-header-center">
            <div class="cn-search-wrap">
                <svg class="cn-search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
                <input type="text" id="searchInput" class="cn-search-input" placeholder="Buscar entre 8,000+ canales...">
                <button class="cn-search-clear" id="searchClear" onclick="clearSearch()">✕</button>
            </div>
        </div>
        <div class="cn-header-right">
            <span class="cn-channel-count" id="channelCount">Cargando...</span>
        </div>
    </div>
</header>

<!-- PLAYER OVERLAY -->
<div class="cn-player-overlay" id="playerOverlay">
    <div class="cn-player-backdrop" onclick="closePlayer()"></div>
    <div class="cn-player-modal">
        <button class="cn-player-close" onclick="closePlayer()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6 6 18M6 6l12 12"/></svg>
        </button>
        <div class="cn-player-screen">
            <video id="cnVideo" controls autoplay playsinline></video>
        </div>
        <div class="cn-player-info">
            <div class="cn-player-channel">
                <img id="playerLogo" src="" alt="" class="cn-player-logo" onerror="this.style.display='none'">
                <div class="cn-player-meta">
                    <div class="cn-player-name" id="playerName"></div>
                    <div class="cn-player-tags" id="playerTags"></div>
                </div>
                <span class="cn-live-pill"><span class="cn-live-dot"></span>EN VIVO</span>
            </div>
            <p class="cn-player-desc" id="playerDesc"></p>
            <div class="cn-player-sources" id="playerSources"></div>
        </div>
    </div>
</div>

<!-- LAYOUT -->
<div class="cn-layout">

    <!-- SIDEBAR -->
    <aside class="cn-sidebar" id="sidebar">
        <div class="cn-sidebar-title">Categorías</div>
        <div class="cn-cat-list" id="catList">
            <button class="cn-cat-btn active" data-cat="all" onclick="filterCat('all',this)">
                <span class="cn-cat-icon">📡</span>
                <span class="cn-cat-label">Todos</span>
                <span class="cn-cat-count" id="count-all">—</span>
            </button>
        </div>
        <!-- Mobile toggle -->
        <button class="cn-sidebar-toggle" id="sidebarToggle" onclick="toggleSidebar()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
            Categorías
        </button>
    </aside>

    <!-- MAIN -->
    <main class="cn-main">
        <!-- Source tabs -->
        <div class="cn-source-tabs">
            <button class="cn-src-tab active" data-src="all" onclick="filterSource('all',this)">📡 Todos</button>
            <button class="cn-src-tab" data-src="Pluto TV" onclick="filterSource('Pluto TV',this)">🌙 Pluto TV</button>
            <button class="cn-src-tab" data-src="IPTV-org" onclick="filterSource('IPTV-org',this)">📺 IPTV Global</button>
        </div>

        <!-- Grid header -->
        <div class="cn-grid-header">
            <div class="cn-grid-title" id="gridTitle">Todos los Canales</div>
            <div class="cn-grid-info" id="gridInfo"></div>
        </div>

        <!-- Channel grid -->
        <div class="cn-grid" id="channelGrid"></div>

        <!-- Loading state -->
        <div class="cn-loading" id="loadingState">
            <div class="cn-spinner"></div>
            <span>Cargando canales...</span>
        </div>

        <!-- Load more -->
        <div class="cn-load-more-wrap" id="loadMoreWrap" style="display:none">
            <button class="cn-load-more" onclick="loadMore()">
                Cargar más canales
            </button>
        </div>
    </main>
</div>

<!-- FOOTER -->
<footer class="cn-footer">
    <div class="cn-footer-inner">
        <img src="./attached_assets/297938-removebg-preview_1760222866015.png" alt="ULTRACANALES" class="cn-footer-logo">
        <p class="cn-footer-copy">© 2025 ULTRACANALES · L3HO Interactive · Todos los derechos reservados</p>
        <div class="cn-footer-links">
            <a href="./index.html">Inicio</a>
            <span>·</span>
            <a href="#">Contacto</a>
        </div>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script src="./canales-script.js?v=20260414"></script>
</body>
</html>
