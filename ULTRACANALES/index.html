<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ULTRACANALES — Televisión en Vivo</title>
    <meta name="theme-color" content="#0a0a0b">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css?v=20260414">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3612607805789879" crossorigin="anonymous"></script>
</head>
<body>

<!-- HEADER -->
<header class="uc-header">
    <div class="uc-header-inner">
        <div class="uc-header-left">
            <a href="/" class="uc-logo-link">
                <img src="./attached_assets/297938-removebg-preview_1760222866015.png" alt="ULTRACANALES" class="uc-logo-img">
            </a>
            <nav class="uc-nav">
                <a href="./index.html" class="uc-nav-item active">Inicio</a>
                <a href="./canales.html" class="uc-nav-item">Todos los Canales</a>
            </nav>
        </div>
        <div class="uc-header-center">
            <div class="uc-search-wrap">
                <svg class="uc-search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
                <input type="text" id="searchInput" class="uc-search-input" placeholder="Buscar canal...">
            </div>
        </div>
        <div class="uc-header-right">
            <span class="uc-live-badge"><span class="uc-live-dot"></span>EN VIVO</span>
            <span class="uc-online-counter" id="onlineCountText">...</span>
        </div>
    </div>
</header>

<!-- HERO -->
<section class="uc-hero" id="heroSection">
    <div class="uc-hero-bg" id="heroBg"></div>
    <div class="uc-hero-gradient"></div>
    <div class="uc-hero-content" id="heroContent">
        <div class="uc-hero-loader">
            <div class="uc-spinner"></div>
        </div>
    </div>
</section>

<!-- PLAYER OVERLAY -->
<div class="uc-player-overlay" id="playerOverlay">
    <div class="uc-player-backdrop" onclick="closePlayer()"></div>
    <div class="uc-player-modal">
        <button class="uc-player-close" onclick="closePlayer()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6 6 18M6 6l12 12"/></svg>
        </button>
        <div class="uc-player-screen">
            <video id="ucVideo" controls autoplay playsinline></video>
        </div>
        <div class="uc-player-info">
            <div class="uc-player-channel">
                <img id="playerLogo" src="" alt="" class="uc-player-logo" onerror="this.style.display='none'">
                <div>
                    <div class="uc-player-name" id="playerName"></div>
                    <span class="uc-live-pill"><span class="uc-live-dot"></span>EN VIVO</span>
                </div>
            </div>
            <p class="uc-player-desc" id="playerDesc"></p>
            <div class="uc-player-sources" id="playerSources"></div>
        </div>
    </div>
</div>

<!-- CHANNEL ROWS -->
<main class="uc-main" id="mainContent">
    <div class="uc-loading-state" id="loadingState">
        <div class="uc-spinner"></div>
        <p>Cargando canales...</p>
    </div>
</main>

<!-- FOOTER -->
<footer class="uc-footer">
    <div class="uc-footer-inner">
        <img src="./attached_assets/297938-removebg-preview_1760222866015.png" alt="ULTRACANALES" class="uc-footer-logo">
        <p class="uc-footer-copy">© 2025 ULTRACANALES · L3HO Interactive · Todos los derechos reservados</p>
        <div class="uc-footer-links">
            <a href="./index.html">Inicio</a>
            <span>·</span>
            <a href="./canales.html">Todos los Canales</a>
        </div>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script src="./script.js?v=20260414"></script>
<script type="module">
    import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue, set, onDisconnect, push, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
    const firebaseConfig = {
        apiKey: "AIzaSyAneyRjnZzvhIFLzykATmW4ShN3IVuf5E0",
        authDomain: "ligamx-daf3d.firebaseapp.com",
        projectId: "ligamx-daf3d",
        storageBucket: "ligamx-daf3d.appspot.com",
        messagingSenderId: "437421248316",
        appId: "1:437421248316:web:38e9f436a57389d2c49839",
        databaseURL: "https://ligamx-daf3d-default-rtdb.firebaseio.com/"
    };
    const app = getApps().length === 0 ? initializeApp(firebaseConfig) : getApps()[0];
    const db = getDatabase(app);
    const el = document.getElementById('onlineCountText');
    const connectedRef = ref(db, '.info/connected');
    onValue(connectedRef, snap => {
        if (snap.val() === true) {
            const myRef = push(ref(db, 'online_users'));
            set(myRef, { ts: serverTimestamp() });
            onDisconnect(myRef).remove();
        }
    });
    onValue(ref(db, 'online_users'), snap => {
        const count = snap.size || 0;
        if (el) el.textContent = `${count.toLocaleString()} online`;
    });
</script>
</body>
</html>
