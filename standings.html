<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="favicon.png">
    <title>Tabla de Posiciones | UltraGol</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <!-- Styles -->
    <link rel="stylesheet" href="css/main.css?v=20251109">
    <link rel="stylesheet" href="css/standings-pro.css?v=20260511">

    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        background: #0d0f14;
        color: #f0f2f8;
        font-family: 'Inter', 'Segoe UI', sans-serif;
        -webkit-font-smoothing: antialiased;
      }

      /* ── Top nav bar ── */
      .st-topbar {
        position: sticky;
        top: 0;
        z-index: 100;
        background: rgba(13,15,20,0.9);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border-bottom: 1px solid rgba(255,255,255,0.07);
      }

      .st-topbar-inner {
        max-width: 900px;
        margin: 0 auto;
        padding: 0.85rem 1rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
      }

      .st-brand {
        display: flex;
        align-items: center;
        gap: 0.55rem;
        text-decoration: none;
      }

      .st-brand img {
        height: 32px;
        width: auto;
      }

      .st-brand-name {
        font-size: 1.05rem;
        font-weight: 900;
        color: #fff;
        letter-spacing: -0.03em;
      }

      .st-brand-name span { color: #e94560; }

      .st-topnav {
        display: flex;
        align-items: center;
        gap: 0.25rem;
      }

      .st-topnav a {
        padding: 0.4rem 0.75rem;
        border-radius: 100px;
        font-size: 0.8rem;
        font-weight: 600;
        color: rgba(240,242,248,0.55);
        text-decoration: none;
        transition: color 0.2s, background 0.2s;
        white-space: nowrap;
      }

      .st-topnav a:hover { color: #fff; background: rgba(255,255,255,0.08); }
      .st-topnav a.active { color: #fff; background: rgba(233,69,96,0.2); }

      .st-topnav a.live-btn {
        color: #fff;
        background: #e94560;
        padding: 0.4rem 1rem;
      }

      .st-topnav a.live-btn:hover { background: #c73552; }

      @media (max-width: 560px) {
        .st-topnav .hide-sm { display: none; }
      }
    </style>

    <!-- Promo / ads check -->
    <script>
    (function() {
        try {
            var stored = localStorage.getItem('ultragol_promo_status');
            if (stored) {
                var s = JSON.parse(stored);
                if (s.expiresAt && new Date().getTime() < s.expiresAt) {
                    document.documentElement.classList.add('ads-hidden');
                    window.promoActive = true;
                }
            }
        } catch(e) {}
    })();
    </script>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3612607805789879" crossorigin="anonymous"></script>
</head>
<body class="standings-pro-page">

<!-- ── Top Nav ── -->
<header class="st-topbar">
  <div class="st-topbar-inner">
    <a href="/" class="st-brand">
      <img src="/assets/logos/ultragol-logo.png" alt="UltraGol" onerror="this.style.display='none'">
      <span class="st-brand-name">Ultra<span>Gol</span></span>
    </a>
    <nav class="st-topnav">
      <a href="/" class="hide-sm">Inicio</a>
      <a href="standings.html" class="active hide-sm">Tabla</a>
      <a href="teams.html" class="hide-sm">Equipos</a>
      <a href="/ultrax" class="live-btn">▶ En Vivo</a>
    </nav>
  </div>
</header>

<!-- ── Hero ── -->
<section class="st-hero">
  <div class="st-hero-badge">
    <span class="dot"></span>
    Temporada 2025 · Clausura
  </div>
  <h1>Tabla de <span>Posiciones</span></h1>
  <p class="st-hero-sub">
    <i class="fas fa-clock"></i>
    Actualizado hoy a las <span id="st-clock">--:--</span>
  </p>

  <!-- League tabs -->
  <div class="st-league-tabs" id="st-tabs"></div>
</section>

<!-- ── Main content ── -->
<div class="st-container">
  <div id="st-main">
    <!-- Filled by JS -->
    <div class="st-loading">
      <div class="st-spinner"></div>
      <span>Cargando posiciones…</span>
    </div>
  </div>
</div>

<!-- ── Footer ── -->
<footer style="text-align:center;padding:2.5rem 1rem 1.5rem;color:rgba(240,242,248,0.3);font-size:0.75rem;border-top:1px solid rgba(255,255,255,0.06);margin-top:3rem">
  © 2025 <strong style="color:rgba(240,242,248,0.5)">UltraGol</strong> — Partidos en vivo, marcadores y transmisiones deportivas.
</footer>

<script src="js/api-service.js?v=20251109"></script>
<script src="js/modern-standings.js?v=20260511"></script>
</body>
</html>
