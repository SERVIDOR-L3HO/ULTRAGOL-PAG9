<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
    <defs>
        <linearGradient id="ballGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#00ff7a"/>
            <stop offset="55%" stop-color="#00d35a"/>
            <stop offset="100%" stop-color="#008c3a"/>
        </linearGradient>
        <linearGradient id="crownGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#ffe98a"/>
            <stop offset="50%" stop-color="#ffc83d"/>
            <stop offset="100%" stop-color="#c98a07"/>
        </linearGradient>
        <radialGradient id="shine" cx="35%" cy="32%" r="55%">
            <stop offset="0%" stop-color="#ffffff" stop-opacity="0.55"/>
            <stop offset="60%" stop-color="#ffffff" stop-opacity="0"/>
        </radialGradient>
        <filter id="dropS" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="1" stdDeviation="1" flood-color="#000" flood-opacity="0.5"/>
        </filter>
    </defs>

    <!-- Crown -->
    <g filter="url(#dropS)">
        <path d="M14 18 L20 10 L26 16 L32 6 L38 16 L44 10 L50 18 L48 24 L16 24 Z"
              fill="url(#crownGrad)" stroke="#7a5500" stroke-width="0.8" stroke-linejoin="round"/>
        <rect x="16" y="22" width="32" height="3" rx="1" fill="url(#crownGrad)" stroke="#7a5500" stroke-width="0.6"/>
        <circle cx="20" cy="11" r="1.6" fill="#fff" stroke="#7a5500" stroke-width="0.4"/>
        <circle cx="32" cy="7" r="1.8" fill="#ff4757" stroke="#7a5500" stroke-width="0.4"/>
        <circle cx="44" cy="11" r="1.6" fill="#fff" stroke="#7a5500" stroke-width="0.4"/>
        <circle cx="26" cy="23.5" r="0.9" fill="#7a5500"/>
        <circle cx="32" cy="23.5" r="0.9" fill="#7a5500"/>
        <circle cx="38" cy="23.5" r="0.9" fill="#7a5500"/>
    </g>

    <!-- Ball -->
    <g filter="url(#dropS)">
        <circle cx="32" cy="44" r="18" fill="url(#ballGrad)" stroke="#003d18" stroke-width="1"/>

        <!-- Soccer pentagons -->
        <polygon points="32,36 36.7,39.4 34.9,44.9 29.1,44.9 27.3,39.4"
                 fill="#04220f" stroke="#04220f" stroke-width="0.5" stroke-linejoin="round"/>
        <polygon points="22,40 24.5,38 27.3,39.4 26.6,42.5 23.5,43"
                 fill="#04220f" stroke="#04220f" stroke-width="0.5" stroke-linejoin="round"/>
        <polygon points="42,40 39.5,38 36.7,39.4 37.4,42.5 40.5,43"
                 fill="#04220f" stroke="#04220f" stroke-width="0.5" stroke-linejoin="round"/>
        <polygon points="27,52 29.1,44.9 26.6,42.5 23,46 24.5,51"
                 fill="#04220f" stroke="#04220f" stroke-width="0.5" stroke-linejoin="round"/>
        <polygon points="37,52 34.9,44.9 37.4,42.5 41,46 39.5,51"
                 fill="#04220f" stroke="#04220f" stroke-width="0.5" stroke-linejoin="round"/>

        <!-- connecting lines -->
        <path d="M32 36 L32 30 M22 40 L17 38 M42 40 L47 38 M27 52 L24 58 M37 52 L40 58"
              stroke="#04220f" stroke-width="0.9" stroke-linecap="round"/>

        <!-- Shine -->
        <circle cx="32" cy="44" r="18" fill="url(#shine)"/>
    </g>

    <!-- PRO ribbon at the bottom-right -->
    <g>
        <rect x="40" y="49" width="20" height="11" rx="2" fill="#0a0a0a" stroke="url(#crownGrad)" stroke-width="1.2"/>
        <text x="50" y="57" font-family="Inter, Arial, sans-serif" font-size="7.5" font-weight="900"
              fill="url(#crownGrad)" text-anchor="middle" letter-spacing="0.5">PRO</text>
    </g>
</svg>
