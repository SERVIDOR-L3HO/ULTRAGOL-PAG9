<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doramas - UltraGol</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            background: #050505;
            font-family: 'Space Grotesk', sans-serif;
            overflow: hidden;
            color: white;
        }

        .topbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 54px;
            background: rgba(5, 5, 5, 0.92);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255,255,255,0.08);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 100;
        }

        .topbar-left {
            display: flex;
            align-items: center;
        }

        .back-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            color: rgba(255,255,255,0.75);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            padding: 6px 12px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.12);
            transition: all 0.2s ease;
        }

        .back-btn:hover {
            color: white;
            background: rgba(255,255,255,0.08);
            border-color: rgba(255,255,255,0.25);
        }

        .online-counter {
            background: rgba(0,0,0,0.55);
            border: 1px solid rgba(74,222,128,0.35);
            padding: 5px 12px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            font-weight: 700;
            color: #4ade80;
            user-select: none;
            letter-spacing: 0.3px;
        }
        .online-dot-mini {
            width: 6px; height: 6px;
            background: #4ade80;
            border-radius: 50%;
            box-shadow: 0 0 8px #4ade80;
            animation: pulseOnline 2s infinite;
            flex-shrink: 0;
        }
        @keyframes pulseOnline {
            0%   { transform:scale(1);   box-shadow:0 0 0 0 rgba(74,222,128,.7); }
            70%  { transform:scale(1.1); box-shadow:0 0 0 6px rgba(74,222,128,0); }
            100% { transform:scale(1);   box-shadow:0 0 0 0 rgba(74,222,128,0); }
        }

        .iframe-wrapper {
            position: fixed;
            top: 54px;
            left: 0;
            width: 100%;
            height: calc(100% - 54px);
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        .loading-overlay {
            position: absolute;
            inset: 0;
            background: #050505;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            z-index: 10;
            transition: opacity 0.5s ease;
        }

        .loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loader-ring {
            width: 56px;
            height: 56px;
            border: 3px solid rgba(99, 102, 241, 0.2);
            border-top-color: #6366f1;
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
        }

        .loading-text {
            color: rgba(255,255,255,0.5);
            font-size: 14px;
            letter-spacing: 0.5px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3612607805789879" crossorigin="anonymous"></script>
</head>
<body>

    <div class="topbar">
        <div class="topbar-left">
            <a href="ULTRA/index.html" class="back-btn">
                <i class="fas fa-arrow-left"></i>
            </a>
        </div>
        <div class="online-counter" id="userCount">
            <span class="online-dot-mini"></span>
            <span id="onlineCountText">...</span>
        </div>
    </div>

    <div class="iframe-wrapper">
        <div class="loading-overlay" id="loadingOverlay">
            <div class="loader-ring"></div>
            <p class="loading-text">Cargando Doramas...</p>
        </div>
        <iframe
            src="https://ultragol-api-3.vercel.app/ultragol-l3ho?get=https://k-nexo.vercel.app/"
            id="knexoFrame"
            allowfullscreen
            allow="autoplay; fullscreen; encrypted-media; picture-in-picture"
            title="K-Nexo"
        ></iframe>
    </div>

    <script>
        const frame = document.getElementById('knexoFrame');
        const overlay = document.getElementById('loadingOverlay');

        frame.addEventListener('load', () => {
            setTimeout(() => {
                overlay.classList.add('hidden');
            }, 400);
        });
    </script>

    <script type="module">
        import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, set, onDisconnect, push, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAneyRjnZzvhIFLzykATmW4ShN3IVuf5E0",
            authDomain: "ligamx-daf3d.firebaseapp.com",
            projectId: "ligamx-daf3d",
            storageBucket: "ligamx-daf3d.appspot.com",
            messagingSenderId: "437421248316",
            appId: "1:437421248316:web:38e9f436a57389d2c49839",
            databaseURL: "https://ligamx-daf3d-default-rtdb.firebaseio.com/"
        };

        const app = getApps().length === 0 ? initializeApp(firebaseConfig) : getApps()[0];
        const db = getDatabase(app);
        const counterEl = document.getElementById('onlineCountText');

        const connectedRef = ref(db, '.info/connected');
        onValue(connectedRef, (snap) => {
            if (snap.val() === true) {
                const myRef = push(ref(db, 'online_users'));
                set(myRef, { ts: serverTimestamp() });
                onDisconnect(myRef).remove();
            }
        });

        onValue(ref(db, 'online_users'), (snapshot) => {
            const count = snapshot.size || 0;
            if (counterEl) counterEl.textContent = `${count.toLocaleString()} ONLINE`;
        });
    </script>

</body>
</html>
