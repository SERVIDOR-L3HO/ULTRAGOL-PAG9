<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>UltraWidget — Agenda Deportiva</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Barlow+Condensed:wght@700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0c0c0c;
  --card:#161616;
  --card2:#1e1e1e;
  --glass:rgba(255,255,255,.055);
  --glass2:rgba(255,255,255,.09);
  --b:rgba(255,255,255,.09);
  --b2:rgba(255,255,255,.16);
  --t1:#fff;
  --t2:rgba(255,255,255,.58);
  --t3:rgba(255,255,255,.28);
  --ora:#f97316;
  --ora2:#fb923c;
  --ora-s:rgba(249,115,22,.14);
  --ora-b:rgba(249,115,22,.32);
  --live:#f43f5e;
  --live-s:rgba(244,63,94,.14);
  --live-b:rgba(244,63,94,.32);
  --grn:#22c55e;
  --r:14px;--r2:10px;--r3:8px;
}
html,body{min-height:100%;background:var(--bg);color:var(--t1);font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;overflow-x:hidden}

/* sport real photo backgrounds */
.sp-bg{
  position:absolute;inset:0;
  background-size:cover;background-position:center;
  filter:brightness(.38) saturate(.9);
}
.sp-soccer   .sp-bg{background-image:url('/ultrawidget/bg/soccer.jpg')}
.sp-basket   .sp-bg{background-image:url('/ultrawidget/bg/basket.jpg')}
.sp-baseball .sp-bg{background-image:url('/ultrawidget/bg/baseball.jpg')}
.sp-tennis   .sp-bg{background-image:url('/ultrawidget/bg/tennis.jpg')}
.sp-f1       .sp-bg{background-image:url('/ultrawidget/bg/f1.jpg')}
.sp-boxing   .sp-bg{background-image:url('/ultrawidget/bg/boxing.jpg')}
.sp-american .sp-bg{background-image:url('/ultrawidget/bg/american.jpg')}
.sp-rugby    .sp-bg{background-image:url('/ultrawidget/bg/rugby.jpg')}
.sp-mma      .sp-bg{background-image:url('/ultrawidget/bg/mma.jpg')}
.sp-golf     .sp-bg{background-image:url('/ultrawidget/bg/golf.jpg')}
.sp-hockey   .sp-bg{background-image:url('/ultrawidget/bg/hockey.jpg')}
.sp-cycling  .sp-bg{background-image:url('/ultrawidget/bg/cycling.jpg')}
.sp-other    .sp-bg{background:linear-gradient(135deg,#0e0e1a,#1e1e33)}
/* gradient overlay on top of photo */
.sp-overlay{
  position:absolute;inset:0;
  background:linear-gradient(
    to right,
    rgba(0,0,0,.88) 0%,
    rgba(0,0,0,.55) 45%,
    rgba(0,0,0,.55) 55%,
    rgba(0,0,0,.88) 100%
  );
}

/* ── TOPBAR ── */
.topbar{
  position:sticky;top:0;z-index:100;
  height:56px;
  display:flex;align-items:center;gap:10px;
  padding:0 14px;
  background:rgba(12,12,12,.9);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-bottom:1px solid var(--b);
}
.logo{display:flex;align-items:center;gap:7px;text-decoration:none;flex-shrink:0}
.logo img{width:30px;height:30px;border-radius:8px;object-fit:contain}
.logo-text{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:800;color:var(--t1);white-space:nowrap}
.logo-text span{color:var(--ora)}

.search-box{
  flex:1;min-width:0;position:relative;
  display:flex;align-items:center;
}
.search-box svg{position:absolute;left:11px;color:var(--t3);pointer-events:none}
.search-box input{
  width:100%;
  background:var(--glass);border:1px solid var(--b);
  border-radius:50px;padding:7px 14px 7px 35px;
  color:var(--t1);font-size:13px;font-family:'Inter',sans-serif;
  outline:none;transition:border-color .2s,background .2s;
}
.search-box input:focus{border-color:var(--ora);background:var(--glass2)}
.search-box input::placeholder{color:var(--t3)}

.tb-right{display:flex;align-items:center;gap:5px;flex-shrink:0}
.tb-pill{
  display:inline-flex;align-items:center;gap:4px;
  border-radius:50px;padding:4px 10px;
  font-size:11.5px;font-weight:700;white-space:nowrap;
}
.p-live{background:var(--live-s);border:1px solid var(--live-b);color:var(--live)}
.p-cnt{background:var(--ora-s);border:1px solid var(--ora-b);color:var(--ora)}
.dot{width:5px;height:5px;border-radius:50%;background:currentColor;animation:blink 1.4s infinite}
@keyframes blink{0%,100%{opacity:.3;transform:scale(.7)}50%{opacity:1;transform:scale(1)}}

/* ── FILTER BAR ── */
.fbar{
  position:sticky;top:56px;z-index:90;
  background:rgba(12,12,12,.88);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border-bottom:1px solid var(--b);
  padding:8px 14px;width:100%;max-width:100vw;overflow:hidden;
}
.fscroll{
  display:flex;align-items:center;gap:5px;
  overflow-x:auto;overflow-y:hidden;
  -webkit-overflow-scrolling:touch;scrollbar-width:none;
}
.fscroll::-webkit-scrollbar{display:none}
.fchip{
  display:inline-flex;align-items:center;gap:4px;flex-shrink:0;white-space:nowrap;
  background:var(--glass);border:1px solid var(--b);
  border-radius:50px;padding:5px 13px;
  font-size:12px;font-weight:600;color:var(--t2);
  cursor:pointer;transition:all .15s;
  -webkit-tap-highlight-color:transparent;user-select:none;
}
.fchip:hover,.fchip:active{background:var(--glass2);color:var(--t1)}
.fchip.on{background:var(--ora-s);border-color:var(--ora-b);color:var(--ora)}
.fchip.on.lv{background:var(--live-s);border-color:var(--live-b);color:var(--live)}
.fcount{background:rgba(255,255,255,.1);border-radius:50px;padding:1px 6px;font-size:10px;font-weight:800;color:var(--t3)}
.fchip.on .fcount{background:rgba(249,115,22,.2);color:var(--ora2)}
.fchip.on.lv .fcount{background:rgba(244,63,94,.2);color:var(--live)}
.fsep{width:1px;height:18px;background:var(--b);flex-shrink:0;margin:0 2px}

/* ── LAYOUT ── */
.wrap{display:flex;min-height:calc(100vh - 56px - 49px);position:relative;z-index:1}

/* sidebar */
.sidebar{
  width:200px;flex-shrink:0;border-right:1px solid var(--b);padding:14px 0;
  position:sticky;top:calc(56px + 49px);height:calc(100vh - 56px - 49px);
  overflow-y:auto;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.08) transparent;
}
.sb-sec{padding:0 10px;margin-bottom:16px}
.sb-lbl{font-size:9.5px;font-weight:800;letter-spacing:1.2px;text-transform:uppercase;color:var(--t3);padding:0 4px;margin-bottom:5px}
.sb-btn{
  display:flex;align-items:center;gap:8px;width:100%;
  background:none;border:none;cursor:pointer;padding:6px 8px;border-radius:9px;
  color:var(--t2);font-size:12.5px;font-weight:500;transition:.12s;
  text-align:left;font-family:'Inter',sans-serif;
}
.sb-btn:hover{background:var(--glass2);color:var(--t1)}
.sb-btn.on{background:var(--ora-s);color:var(--ora)}
.sb-ico{width:20px;height:20px;border-radius:5px;display:grid;place-items:center;font-size:11px;background:var(--glass);flex-shrink:0}
.sb-btn.on .sb-ico{background:var(--ora-s)}
.sb-n{margin-left:auto;font-size:10.5px;font-weight:800;color:var(--t3);background:var(--glass);border-radius:50px;padding:1px 7px}
.sb-btn.on .sb-n{background:var(--ora-s);color:var(--ora)}

/* ── MAIN ── */
.main{flex:1;padding:14px 12px;min-width:0}

.toolbar{display:flex;align-items:center;gap:7px;margin-bottom:14px;flex-wrap:wrap}
.tb-title{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:900;letter-spacing:.3px}
.tb-title span{color:var(--ora)}
.sort-sel{
  background:var(--glass);border:1px solid var(--b);border-radius:var(--r3);
  color:var(--t2);font-size:12px;padding:5px 9px;outline:none;cursor:pointer;
  font-family:'Inter',sans-serif;
}
.sort-sel:focus{border-color:var(--ora)}
.vbtns{display:flex;background:var(--glass);border:1px solid var(--b);border-radius:var(--r3);padding:2px;gap:2px}
.vbtn{background:none;border:none;cursor:pointer;color:var(--t3);padding:4px 8px;border-radius:5px;transition:.12s}
.vbtn.on{background:var(--glass2);color:var(--t1)}
.ref-btn{
  display:flex;align-items:center;gap:5px;
  background:var(--glass);border:1px solid var(--b2);
  border-radius:var(--r3);padding:5px 11px;
  color:var(--t2);font-size:12px;font-weight:600;
  cursor:pointer;transition:.15s;font-family:'Inter',sans-serif;
}
.ref-btn:hover{border-color:var(--ora);color:var(--ora)}
.ref-btn.loading svg{animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── SECTION HEADER ── */
.dg{margin-bottom:16px}
.dg-head{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.dg-lbl{font-size:10.5px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--t3)}
.dg-lbl.today{color:var(--grn)}
.dg-lbl.lv-grp{color:var(--live)}
.dg-line{flex:1;height:1px;background:var(--b)}
.dg-cnt{font-size:10px;font-weight:800;color:var(--t3);background:var(--glass);border-radius:50px;padding:2px 7px}

/* ── CARD CONTAINERS ── */
.ev-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:8px}
.ev-list{display:flex;flex-direction:column;gap:7px}

/* ── MATCH CARD ── */
.mcard{
  position:relative;overflow:hidden;
  border-radius:var(--r);
  border:1px solid rgba(255,255,255,.08);
  cursor:pointer;
  transition:border-color .15s,transform .15s,box-shadow .15s;
  min-height:90px;
}
.mcard:hover{border-color:rgba(255,255,255,.18);transform:translateY(-2px);box-shadow:0 10px 40px rgba(0,0,0,.5)}
.mcard:active{transform:translateY(0)}
.mcard.live-card{border-color:rgba(244,63,94,.25)}
.mcard.live-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--live),var(--ora));z-index:2}

/* bg already handled by .sp-bg and .sp-overlay classes */

/* card content above bg */
.mcard-inner{
  position:relative;z-index:3;
  padding:12px 14px;
  display:flex;flex-direction:column;gap:8px;
}

/* top row */
.mcard-top{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.stag{
  display:inline-flex;align-items:center;gap:4px;
  background:rgba(0,0,0,.45);border:1px solid rgba(255,255,255,.12);
  border-radius:5px;padding:2px 7px;
  font-size:9.5px;font-weight:800;color:rgba(255,255,255,.6);
  letter-spacing:.5px;text-transform:uppercase;
}
.ltag{
  display:inline-flex;align-items:center;gap:4px;
  background:var(--live-s);border:1px solid var(--live-b);
  border-radius:5px;padding:2px 7px;
  font-size:9.5px;font-weight:800;color:var(--live);
}
.ftag{
  background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);
  border-radius:5px;padding:2px 7px;
  font-size:9.5px;font-weight:700;color:var(--t3);
}
.ttag{
  margin-left:auto;
  display:inline-flex;align-items:center;gap:4px;
  font-size:12.5px;font-weight:700;color:rgba(255,255,255,.75);
  font-variant-numeric:tabular-nums;
}

/* teams row */
.mcard-teams{
  display:flex;align-items:center;gap:6px;
}
.team-side{
  flex:1;display:flex;align-items:center;gap:8px;min-width:0;
}
.team-side.right{flex-direction:row-reverse;text-align:right}
.team-logo{
  width:36px;height:36px;flex-shrink:0;
  border-radius:8px;object-fit:contain;
  background:rgba(0,0,0,.5);
  border:1px solid rgba(255,255,255,.12);
  padding:3px;
}
.team-logo-fb{
  width:36px;height:36px;flex-shrink:0;
  border-radius:8px;background:rgba(0,0,0,.5);
  border:1px solid rgba(255,255,255,.12);
  display:grid;place-items:center;font-size:16px;
}
.team-name{
  font-size:13.5px;font-weight:800;color:var(--t1);
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  line-height:1.2;flex:1;
}
.team-side.right .team-name{text-align:right}
.vs-badge{
  flex-shrink:0;
  background:rgba(249,115,22,.18);
  border:1px solid var(--ora-b);
  border-radius:6px;
  padding:4px 7px;
  font-size:10px;font-weight:900;color:var(--ora);
  letter-spacing:.5px;
}
.ev-title-solo{
  font-size:13px;font-weight:700;color:var(--t1);line-height:1.3;
}

/* bottom row */
.mcard-bot{display:flex;align-items:center;gap:6px}
.league-tag{
  display:inline-flex;align-items:center;gap:4px;
  background:rgba(0,0,0,.4);border:1px solid rgba(255,255,255,.1);
  border-radius:20px;padding:3px 9px;
  font-size:11px;color:var(--t2);
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  max-width:160px;
}
.ch-tag{
  margin-left:auto;flex-shrink:0;
  display:inline-flex;align-items:center;gap:4px;
  background:var(--ora-s);border:1px solid var(--ora-b);
  border-radius:50px;padding:3px 10px;
  font-size:11px;font-weight:700;color:var(--ora);
}
.ch-tag.zero{background:rgba(255,255,255,.04);border-color:var(--b);color:var(--t3)}
.arrow-ico{color:var(--t3);flex-shrink:0}

/* list mode adjustments */
.ev-list .mcard-teams{gap:8px}
.ev-list .team-logo,.ev-list .team-logo-fb{width:32px;height:32px}
.ev-list .team-name{font-size:12.5px}

/* ── STATES ── */
.stwrap{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px;gap:12px}
.spinner{width:34px;height:34px;border:3px solid rgba(255,255,255,.1);border-top-color:var(--ora);border-radius:50%;animation:spin .7s linear infinite}
.st-txt{font-size:14px;color:var(--t2)}
.st-sub{font-size:12px;color:var(--t3)}

/* ── MODAL ── */
.backdrop{
  position:fixed;inset:0;z-index:200;
  background:rgba(0,0,0,.75);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  display:flex;align-items:flex-end;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .22s;
}
.backdrop.open{opacity:1;pointer-events:all}
@media(min-width:640px){.backdrop{align-items:center}}

.sheet{
  background:rgba(14,14,14,.97);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border:1px solid var(--b2);
  width:100%;max-width:520px;
  border-radius:var(--r) var(--r) 0 0;
  max-height:92vh;overflow-y:auto;
  transform:translateY(40px);
  transition:transform .26s cubic-bezier(.25,.46,.45,.94);
  scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.08) transparent;
}
.backdrop.open .sheet{transform:translateY(0)}
@media(min-width:640px){
  .sheet{border-radius:var(--r);max-height:88vh;transform:scale(.95)}
  .backdrop.open .sheet{transform:scale(1)}
}
.sh-handle{width:34px;height:4px;border-radius:4px;background:var(--glass2);margin:10px auto 0}
.mhead{
  display:flex;align-items:center;gap:10px;
  padding:14px 16px 12px;border-bottom:1px solid var(--b);
  position:sticky;top:0;background:rgba(14,14,14,.97);z-index:1;
}
.mhead-back{
  display:flex;align-items:center;gap:5px;
  background:var(--glass2);border:none;border-radius:8px;
  padding:5px 11px;cursor:pointer;color:var(--t2);
  font-size:12.5px;font-weight:600;transition:.15s;
  flex-shrink:0;font-family:'Inter',sans-serif;
}
.mhead-back:hover{background:rgba(255,255,255,.14);color:var(--t1)}
.mhead-title{font-size:14px;font-weight:700;color:var(--t1);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mhead-close{
  width:28px;height:28px;border-radius:50%;
  background:var(--glass2);border:none;cursor:pointer;
  color:var(--t2);display:grid;place-items:center;transition:.15s;flex-shrink:0;
}
.mhead-close:hover{background:rgba(255,255,255,.14);color:var(--t1)}

.mbanner{
  display:flex;align-items:center;gap:10px;
  padding:16px 16px 14px;border-bottom:1px solid var(--b);
}
.mb-team{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;min-width:0}
.mb-logo{width:50px;height:50px;border-radius:10px;object-fit:contain;background:var(--glass2);border:1px solid var(--b);padding:5px}
.mb-logo-fb{width:50px;height:50px;border-radius:10px;background:var(--glass2);border:1px solid var(--b);display:grid;place-items:center;font-size:22px}
.mb-name{font-size:12.5px;font-weight:700;color:var(--t1);text-align:center;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mb-vs{flex-shrink:0;display:flex;flex-direction:column;align-items:center}
.mb-vs-txt{font-size:11px;font-weight:900;color:var(--t3)}
.mb-meta{padding:10px 16px;display:flex;gap:6px;flex-wrap:wrap;border-bottom:1px solid var(--b)}
.mb-tag{display:inline-flex;align-items:center;gap:4px;background:var(--glass);border:1px solid var(--b);border-radius:7px;padding:4px 9px;font-size:11.5px;color:var(--t2)}

/* ── sv-* channel selector (UltraX design) ── */
.sv-wrapper{
  padding:18px 16px 20px;
  background:#08080c;
  font-family:'Inter',-apple-system,sans-serif;
  position:relative;overflow:hidden;
}
.sv-wrapper::before{
  content:'';position:absolute;top:0;left:0;right:0;height:120px;
  background:radial-gradient(ellipse 80% 100% at 50% 0%,rgba(255,107,53,.06) 0%,transparent 100%);
  pointer-events:none;
}
.sv-meta{display:flex;align-items:center;gap:8px;margin-bottom:16px}
.sv-live-dot{width:8px;height:8px;background:#4ade80;border-radius:50%;flex-shrink:0;animation:svPulse 2s ease-in-out infinite}
.sv-live-label{font-size:10.5px;font-weight:800;color:#fff;letter-spacing:1.6px;text-transform:uppercase}
.sv-count-pill{margin-left:auto;background:rgba(255,107,53,.12);border:1px solid rgba(255,107,53,.22);border-radius:20px;padding:2px 10px;font-size:10px;font-weight:700;color:#ff8a5c;letter-spacing:.4px}
.sv-hint{font-size:11px;color:rgba(255,255,255,.28);margin-bottom:14px;letter-spacing:.1px}
.sv-list{display:flex;flex-direction:column;gap:10px}
.sv-card{
  position:relative;display:flex;align-items:center;gap:14px;
  background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);
  border-radius:20px;padding:14px 14px 14px 16px;cursor:pointer;overflow:hidden;
  transition:transform .22s cubic-bezier(.34,1.56,.64,1),background .22s,border-color .22s,box-shadow .22s;
  animation:svSlideUp .38s ease both;
  -webkit-tap-highlight-color:transparent;
}
.sv-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent 10%,rgba(255,255,255,.1) 50%,transparent 90%)}
.sv-card::after{content:'';position:absolute;top:14px;bottom:14px;left:0;width:3px;border-radius:0 3px 3px 0;background:linear-gradient(180deg,#4ade80,#22c55e);box-shadow:0 0 10px rgba(74,222,128,.5);transition:width .2s,box-shadow .2s}
.sv-card:hover{background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.13);transform:translateY(-2px) scale(1.005);box-shadow:0 10px 36px rgba(0,0,0,.45)}
.sv-card:hover::after{width:4px;box-shadow:0 0 20px rgba(74,222,128,.8)}
.sv-card:active{transform:scale(.985)}
.sv-card-featured{background:rgba(255,107,53,.07);border-color:rgba(255,107,53,.28);animation:svGlow 2.8s ease-in-out infinite,svSlideUp .38s ease both}
.sv-card-featured::after{background:linear-gradient(180deg,#ff6b35,#ff4500);box-shadow:0 0 14px rgba(255,69,0,.65)}
.sv-card-featured:hover{background:rgba(255,107,53,.1);border-color:rgba(255,107,53,.42)}
.sv-num{width:42px;height:42px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:900;flex-shrink:0;position:relative;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:#ccc;letter-spacing:-.5px;transition:all .22s}
.sv-card-featured .sv-num{background:linear-gradient(135deg,#ff6b35 0%,#ff4500 100%);border-color:transparent;color:#fff;box-shadow:0 4px 18px rgba(255,69,0,.45)}
.sv-card:hover .sv-num{border-color:rgba(255,255,255,.18);color:#fff}

<script>
'use strict';

/* ─── SPORT → CSS CLASS & ICON ─── */
const SPORT_CLASS = {
  'fútbol':'soccer','futbol':'soccer','soccer':'soccer','football':'soccer',
  'baloncesto':'basket','basketball':'basket','nba':'basket',
  'béisbol':'baseball','beisbol':'baseball','baseball':'baseball','mlb':'baseball',
  'tenis':'tennis','tennis':'tennis',
  'formula 1':'f1','f1':'f1','fórmula 1':'f1','automovilismo':'f1','motorsport':'f1',
  'boxeo':'boxing','boxing':'boxing','box':'boxing',
  'mma':'mma','ufc':'mma','lucha':'mma','wwe':'mma','combate':'mma',
  'americano':'american','football americano':'american','nfl':'american',
  'rugby':'rugby',
  'golf':'golf',
  'hockey':'hockey',
  'ciclismo':'cycling','cycling':'cycling',
};
const SPORT_ICONS = {
  futbol:'⚽',fútbol:'⚽',soccer:'⚽','american football':'🏈','football americano':'🏈',
  basketball:'🏀',baloncesto:'🏀',tenis:'🎾',tennis:'🎾',baseball:'⚾',béisbol:'⚾',beisbol:'⚾',
  boxing:'🥊',boxeo:'🥊',mma:'🥋',ufc:'🥋','formula 1':'🏎️','fórmula 1':'🏎️',f1:'🏎️',
  automovilismo:'🏎️',motorsport:'🏎️',golf:'⛳',hockey:'🏒',rugby:'🏉',
  volleyball:'🏐',voleibol:'🏐',cycling:'🚴',ciclismo:'🚴',wwe:'🤼',lucha:'🤼',
};
const MONTH_MAP={ene:'01',feb:'02',mar:'03',abr:'04',may:'05',jun:'06',jul:'07',ago:'08',sep:'09',oct:'10',nov:'11',dic:'12',jan:'01',apr:'04',aug:'08',dec:'12'};
const WD_MAP={sunday:0,monday:1,tuesday:2,wednesday:3,thursday:4,friday:5,saturday:6,domingo:0,lunes:1,martes:2,miercoles:3,jueves:4,viernes:5,sabado:6};

function sportClass(s){
  if(!s) return 'sp-other';
  const k=s.toLowerCase().trim();
  return 'sp-'+(SPORT_CLASS[k]||'other');
}
function sportIcon(s){
  if(!s) return '🏆';
  const k=s.toLowerCase();
  for(const[k2,ic] of Object.entries(SPORT_ICONS)){if(k.includes(k2)) return ic}
  return '🏆';
}
function norm(s){return(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]/g,'')}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function decodeUrl(u){if(!u||typeof u!=='string') return u;if(u.startsWith('http')) return u;try{return atob(u)}catch(e){return u}}

/* ─── MEXICO TIMEZONE ─── */
function toMexTime(raw){
  if(!raw) return '';
  // Already formatted like "09:10 p.m." or "11:30" — return as-is
  if(/^\d{1,2}:\d{2}(\s?(a\.m\.|p\.m\.|am|pm))?$/i.test(raw.trim())) return raw.trim();
  // Try parsing ISO or datetime
  try{
    const d=new Date(raw);
    if(!isNaN(d)) return d.toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit',hour12:true,timeZone:'America/Mexico_City'});
  }catch(e){}
  return raw;
}

function toMexDate(raw){
  if(!raw) return null;
  if(/^\d{4}-\d{2}-\d{2}$/.test(raw)) return raw;
  const m=raw.match(/(\d{1,2})\s+(\w{3})\s+(\d{4})/i);
  if(m){const mo=MONTH_MAP[m[2].toLowerCase()];if(mo) return `${m[3]}-${mo}-${m[1].padStart(2,'0')}`}
  const wdk=norm(raw.split(' ')[0]);
  if(wdk in WD_MAP){
    const today=new Date();const tw=today.getDay();let d=WD_MAP[wdk]-tw;
    if(d<-1) d+=7;
    const t=new Date(today);t.setDate(today.getDate()+d);
    return t.toISOString().split('T')[0];
  }
  try{
    const d=new Date(raw);
    if(!isNaN(d)) return d.toLocaleDateString('en-CA',{timeZone:'America/Mexico_City'});
  }catch(e){}
  return null;
}

function normalizeStatus(s){
  const k=(s||'').toString().toLowerCase();
  if(k.includes('vivo')||k.includes('live')) return 'live';
  if(k.includes('finaliz')||k.includes('terminad')||k.includes('finish')||k.includes('end')||k.includes('full')) return 'finished';
  return 'upcoming';
}

function extractChannels(item,src){
  const ch=[];
  function add(name,url,q,lang){
    const u=decodeUrl(url);
    if(u && typeof u==='string' && u.startsWith('http') && !ch.find(c=>c.url===u))
      ch.push({name:name||'Canal',url:u,quality:q||'',lang:lang||'',src});
  }
  if(item.canales&&Array.isArray(item.canales)){
    item.canales.forEach(c=>{
      const n=c.nombre||c.canal||'Canal';const lang=c.idioma||'';
      if(c.links){
        if(c.links.principal) add(n,c.links.principal,'',lang);
        if(c.links.backup) add(n+' (Backup)',c.links.backup,'',lang);
        if(c.links.wrapper) add(n+' (Alt)',c.links.wrapper,'',lang);
      } else if(c.url) add(n,c.url,'',lang);
      if(c.enlaces) c.enlaces.forEach(e=>{if(e.url) add(n,e.url,e.calidad||'',lang)});
    });
  }
  if(item.url&&!(item.canales&&item.canales.length)) add(item.titulo||item.evento||'Stream',item.url,'','');
  if(item.url&&item.canales&&!item.canales.length) add('Stream',item.url,'','');
  if(item.urlOriginal) add('Stream HD',item.urlOriginal,'HD','');
  if(item.enlacesDetalle) item.enlacesDetalle.forEach(e=>{if(e.url) add(e.nombre||'Stream',e.url,'','')});
  if(item.links) item.links.forEach(l=>{if(l.data) l.data.forEach(d=>{if(d.match_url) add(d.stream_source||'Stream',d.match_url,d.stream_quality||'','')})});
  if(item.fuentes) item.fuentes.forEach(f=>{if(f.url) add(f.fuente||'Fuente',f.url,'','')});
  return ch;
}

function normalizeEvent(item,src){
  let eq1=item.equipo1||item.local||'';
  let eq2=item.equipo2||item.visitante||'';
  if(!eq1&&(item.title||item.titulo)){
    const t=item.title||item.titulo;
    const p=t.split(/\s+vs\.?\s+/i);
    if(p.length>=2){eq1=p[0].trim();eq2=p.slice(1).join(' vs ').trim()}
    else{eq1=t}
  }

  // Parse hora & fecha — prefer Mexico timezone
  let raw_hora=item.hora||item.hour||'';
  let raw_fecha=item.fecha||item.date||'';
  if(!raw_hora&&item.fechaISO) raw_hora=item.fechaISO;
  if(!raw_fecha&&item.fechaISO) raw_fecha=item.fechaISO;

  const hora=toMexTime(raw_hora);
  const fecha=toMexDate(raw_fecha);

  const status=item.estado
    ?normalizeStatus(typeof item.estado==='object'?(item.estado.descripcion||''):item.estado)
    :'upcoming';

  // Filter out base64 logos
  const logo1=(item.logo1&&!item.logo1.startsWith('data:')&&item.logo1.length>10)?item.logo1:null;
  const logo2=(item.logo2&&!item.logo2.startsWith('data:')&&item.logo2.length>10)?item.logo2:null;

  return{
    titulo:item.titulo||item.evento||item.title||`${eq1} vs ${eq2}`,
    equipo1:eq1,equipo2:eq2,
    liga:item.liga||item.league||item.info||item.pais||'',
    deporte:item.deporte||item.categoria||item.sport||'Fútbol',
    hora,fecha,status,logo1,logo2,
    channels:extractChannels(item,src),src
  };
}

function dedup(raw){
  const map=new Map();
  raw.forEach(e=>{
    const t=[norm(e.equipo1),norm(e.equipo2)].filter(Boolean).sort().join('__');
    const key=t||norm(e.titulo);
    if(!key) return;
    if(map.has(key)){
      const ex=map.get(key);
      e.channels.forEach(c=>{if(!ex.channels.find(x=>x.url===c.url)) ex.channels.push(c)});
      if(!ex.fecha&&e.fecha) ex.fecha=e.fecha;
      if(!ex.logo1&&e.logo1) ex.logo1=e.logo1;
      if(!ex.logo2&&e.logo2) ex.logo2=e.logo2;
      if(!ex.liga&&e.liga) ex.liga=e.liga;
      if(ex.status==='upcoming'&&e.status==='live') ex.status='live';
    } else {
      map.set(key,{...e});
    }
  });
  return[...map.values()];
}

/* ─── STATE ─── */
let events=[],statusFilter='all',sportFilter=null,leagueFilter=null,viewMode='grid';
let currentEvent=null,currentStreamUrl=null,loadTimer=null;

/* ─── LOAD ─── */
async function loadAll(){
  const btn=document.getElementById('rfBtn');
  btn.classList.add('loading');
  document.getElementById('container').innerHTML=`<div class="stwrap"><div class="spinner"></div><div class="st-txt">Cargando agenda deportiva…</div></div>`;

  let data={api1:[],api2:[],api3:[],api4:[],api5:[],api6:[],api7:[]};
  try{const r=await fetch('/api/ultrawidget-agenda');if(r.ok) data=await r.json();}
  catch(e){console.warn('fetch error:',e)}

  const raw=[];
  (data.api1||[]).forEach(i=>raw.push(normalizeEvent(i,'API1')));
  (data.api2||[]).forEach(i=>raw.push(normalizeEvent(i,'API2')));
  (data.api3||[]).forEach(i=>raw.push(normalizeEvent(i,'API3')));
  (data.api4||[]).forEach(i=>raw.push(normalizeEvent(i,'API4')));
  (data.api5||[]).forEach(i=>raw.push(normalizeEvent(i,'API5')));
  (data.api6||[]).forEach(i=>raw.push(normalizeEvent(i,'API6')));
  (data.api7||[]).forEach(i=>raw.push(normalizeEvent(i,'API7')));

  events=dedup(raw);
  btn.classList.remove('loading');
  updateStats();buildSidebar();buildSportChips();renderAll();
}

function updateStats(){
  const live=events.filter(e=>e.status==='live').length;
  const tot=events.length;
  document.getElementById('cntLive').textContent=live;
  document.getElementById('cntEv').textContent=tot;
  document.getElementById('fc-all').textContent=tot;
  document.getElementById('fc-up').textContent=events.filter(e=>e.status==='upcoming').length;
  document.getElementById('fc-fin').textContent=events.filter(e=>e.status==='finished').length;
}

function buildSidebar(){
  const sports=[...new Set(events.map(e=>e.deporte).filter(Boolean))].sort();
  const leagues=[...new Set(events.map(e=>e.liga).filter(Boolean))].sort();
  document.getElementById('sbSports').innerHTML=sports.slice(0,16).map(s=>{
    const c=events.filter(e=>e.deporte===s).length;
    return`<button class="sb-btn${sportFilter===s?' on':''}" onclick="setSport('${esc(s)}',this)">
      <span class="sb-ico">${sportIcon(s)}</span>${esc(s)}<span class="sb-n">${c}</span>
    </button>`;
  }).join('');
  document.getElementById('sbLeagues').innerHTML=leagues.slice(0,20).map(l=>{
    const c=events.filter(e=>e.liga===l).length;
    return`<button class="sb-btn${leagueFilter===l?' on':''}" onclick="setLeague('${esc(l)}',this)">
      <span class="sb-ico">🏆</span><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(l)}</span><span class="sb-n">${c}</span>
    </button>`;
  }).join('');
}

function buildSportChips(){
  const sports=[...new Set(events.map(e=>e.deporte).filter(Boolean))].sort();
  document.getElementById('sportChips').innerHTML=sports.map(s=>
    `<button class="fchip${sportFilter===s?' on':''}" onclick="setSportChip('${esc(s)}',this)">${sportIcon(s)} ${esc(s)}</button>`
  ).join('');
}

/* ─── FILTERS ─── */
function setStatus(f,btn){
  statusFilter=f;sportFilter=null;leagueFilter=null;
  document.querySelectorAll('.fscroll .fchip[data-f]').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  document.querySelectorAll('.sb-btn').forEach(b=>b.classList.remove('on'));
  renderAll();
}
function setSport(s,btn){
  sportFilter=sportFilter===s?null:s;leagueFilter=null;
  document.querySelectorAll('.sb-btn').forEach(b=>b.classList.remove('on'));
  if(sportFilter) btn.classList.add('on');renderAll();
}
function setSportChip(s,btn){
  sportFilter=sportFilter===s?null:s;leagueFilter=null;
  document.querySelectorAll('#sportChips .fchip').forEach(b=>b.classList.remove('on'));
  if(sportFilter) btn.classList.add('on');
  document.querySelectorAll('.sb-btn').forEach(b=>b.classList.remove('on'));renderAll();
}
function setLeague(l,btn){
  leagueFilter=leagueFilter===l?null:l;sportFilter=null;
  document.querySelectorAll('.sb-btn').forEach(b=>b.classList.remove('on'));
  if(leagueFilter) btn.classList.add('on');renderAll();
}
function setView(v){
  viewMode=v;
  document.getElementById('vGrid').classList.toggle('on',v==='grid');
  document.getElementById('vList').classList.toggle('on',v==='list');
  renderAll();
}

function getVisible(){
  const q=norm(document.getElementById('searchInput').value||'');
  return events.filter(e=>{
    if(statusFilter==='live'&&e.status!=='live') return false;
    if(statusFilter==='upcoming'&&e.status!=='upcoming') return false;
    if(statusFilter==='finished'&&e.status!=='finished') return false;
    if(sportFilter&&e.deporte!==sportFilter) return false;
    if(leagueFilter&&e.liga!==leagueFilter) return false;
    if(q){const hay=norm(e.titulo+e.equipo1+e.equipo2+e.liga+e.deporte);if(!hay.includes(q)) return false}
    return true;
  });
}

function getSorted(arr){
  const s=document.getElementById('sortSel').value;
  return[...arr].sort((a,b)=>{
    if(s==='status'){const o={live:0,upcoming:1,finished:2};const d=(o[a.status]||1)-(o[b.status]||1);if(d!==0) return d;return(a.hora||'').localeCompare(b.hora||'')}
    if(s==='time') return(a.hora||'').localeCompare(b.hora||'');
    if(s==='league') return(a.liga||'').localeCompare(b.liga||'');
    if(s==='channels') return b.channels.length-a.channels.length;
    return 0;
  });
}

/* ─── DATE LABEL ─── */
function dateLabel(d){
  if(!d) return null;
  try{
    const dt=new Date(d+'T12:00:00');
    const today=new Date();today.setHours(0,0,0,0);
    const tom=new Date(today);tom.setDate(today.getDate()+1);
    const yest=new Date(today);yest.setDate(today.getDate()-1);
    dt.setHours(0,0,0,0);
    if(dt.getTime()===today.getTime()) return{label:'HOY',cls:'today'};
    if(dt.getTime()===tom.getTime()) return{label:'MAÑANA',cls:''};
    if(dt.getTime()===yest.getTime()) return{label:'AYER',cls:''};
    return{label:dt.toLocaleDateString('es-MX',{weekday:'short',day:'numeric',month:'short'}).toUpperCase(),cls:''};
  }catch(e){return null}
}

/* ─── LOGO HELPER ─── */
function imgErr(el,cls){const d=document.createElement('div');d.className=cls;d.textContent=sportIcon(el.dataset.sport||'');el.parentNode&&el.parentNode.replaceChild(d,el)}

function logoEl(url,name,sport,small){
  const sz=small?32:36;
  const safeN=esc(name||'');
  if(!url||url.startsWith('data:')||url.length<10){
    return`<div class="team-logo-fb" data-team-name="${safeN}" data-sz="${sz}" data-sport="${esc(sport||'')}" style="width:${sz}px;height:${sz}px">${sportIcon(sport)}</div>`;
  }
  return`<img class="team-logo" style="width:${sz}px;height:${sz}px" src="${esc(url)}" alt="${safeN}" loading="lazy" data-sport="${esc(sport||'')}" onerror="imgErr(this,'team-logo-fb')">`;
}

/* ─── RENDER CARD ─── */
function renderCard(e,idx){
  const isLive=e.status==='live';
  const isFin=e.status==='finished';
  const sc=sportClass(e.deporte);
  const hasTeams=e.equipo1&&e.equipo2;

  const statusTag=isLive
    ?`<span class="ltag"><span class="dot"></span>EN VIVO</span>`
    :isFin?`<span class="ftag">FINALIZADO</span>`:'';

  const timeTag=e.hora
    ?`<span class="ttag"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>${esc(e.hora)}</span>`
    :'';

  const teamsHtml=hasTeams
    ?`<div class="mcard-teams">
        <div class="team-side">
          ${logoEl(e.logo1,e.equipo1,e.deporte,false)}
          <span class="team-name">${esc(e.equipo1)}</span>
        </div>
        <div class="vs-badge">VS</div>
        <div class="team-side right">
          <span class="team-name">${esc(e.equipo2)}</span>
          ${logoEl(e.logo2,e.equipo2,e.deporte,false)}
        </div>
      </div>`
    :`<div class="ev-title-solo">${esc(e.titulo)}</div>`;

  const n=e.channels.length;
  const chTag=`<span class="ch-tag${n===0?' zero':''}">
    <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="2" y="7" width="20" height="15" rx="2"/><path d="M17 7V5a2 2 0 0 0-2-2H9a2 2 0 0 0-2 2v2"/></svg>
    ${n>0?n+' canal'+(n>1?'es':''):'Sin canales'}
  </span>`;

  return`<div class="mcard ${sc}${isLive?' live-card':''}" data-idx="${idx}" onclick="openChannels(${idx})">
    <div class="sp-bg"></div>
    <div class="sp-overlay"></div>
    <div class="mcard-inner">
      <div class="mcard-top">
        <span class="stag">${sportIcon(e.deporte)} ${esc(e.deporte||'Deporte')}</span>
        ${statusTag}${timeTag}
      </div>
      ${teamsHtml}
      <div class="mcard-bot">
        <span class="league-tag">🏆 ${esc(e.liga||'Internacional')}</span>
        ${chTag}
        <svg class="arrow-ico" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m9 18 6-6-6-6"/></svg>
      </div>
    </div>
  </div>`;
}

/* ─── RENDER ALL ─── */
function renderAll(){
  const container=document.getElementById('container');
  const visible=getSorted(getVisible());
  if(!visible.length){
    container.innerHTML=`<div class="stwrap"><div class="st-txt" style="font-size:40px;opacity:.3">📭</div><div class="st-txt">Sin resultados</div><div class="st-sub">Cambia los filtros o actualiza</div></div>`;
    return;
  }
  const sortedBy=document.getElementById('sortSel').value;
  const wClass=viewMode==='grid'?'ev-grid':'ev-list';
  let html='';

  if(sortedBy==='status'){
    const liveEv=visible.filter(e=>e.status==='live');
    const rest=visible.filter(e=>e.status!=='live');
    if(liveEv.length){
      const idxs=liveEv.map(e=>events.indexOf(e));
      html+=`<div class="dg"><div class="dg-head"><span class="dg-lbl lv-grp">🔴 En Vivo Ahora</span><div class="dg-line"></div><span class="dg-cnt">${liveEv.length}</span></div>
        <div class="${wClass}">${idxs.map((idx,i)=>renderCard(liveEv[i],idx)).join('')}</div></div>`;
    }
    html+=renderGroupsHtml(groupByDate(rest),wClass);
  } else {
    html=renderGroupsHtml(groupByDate(visible),wClass);
  }
  container.innerHTML=html;
}

function groupByDate(arr){
  const g={};arr.forEach(e=>{const k=e.fecha||'__none__';if(!g[k]) g[k]=[];g[k].push(e)});return g;
}

function renderGroupsHtml(groups,wClass){
  let html='';
  const keys=Object.keys(groups).sort((a,b)=>{if(a==='__none__') return 1;if(b==='__none__') return -1;return a.localeCompare(b)});
  keys.forEach(k=>{
    const grp=groups[k];
    const dl=k==='__none__'?null:dateLabel(k);
    const label=dl?dl.label:'SIN FECHA';
    const cls=dl?dl.cls:'';
    const idxs=grp.map(e=>events.indexOf(e));
    html+=`<div class="dg"><div class="dg-head"><span class="dg-lbl ${cls}">${label}</span><div class="dg-line"></div><span class="dg-cnt">${grp.length}</span></div>
      <div class="${wClass}">${idxs.map((idx,i)=>renderCard(grp[i],idx)).join('')}</div></div>`;
  });
  return html;
}

/* ─── MODALS ─── */
function openChannels(idx){
  currentEvent=events[idx];const e=currentEvent;
  document.getElementById('mTitle').textContent=e.titulo;
  const hasT=e.equipo1&&e.equipo2;
  document.getElementById('mBanner').innerHTML=hasT
    ?`<div class="mb-team"><div class="mb-logo-fb">${logoEl(e.logo1,e.equipo1,e.deporte,false)}</div><span class="mb-name">${esc(e.equipo1)}</span></div>
       <div class="mb-vs"><span class="mb-vs-txt">VS</span></div>
       <div class="mb-team"><div class="mb-logo-fb">${logoEl(e.logo2,e.equipo2,e.deporte,false)}</div><span class="mb-name">${esc(e.equipo2)}</span></div>`
    :`<div style="padding:8px 0;font-weight:700;font-size:15px">${esc(e.titulo)}</div>`;
  const tags=[];
  if(e.deporte) tags.push(`<span class="mb-tag">${sportIcon(e.deporte)} ${esc(e.deporte)}</span>`);
  if(e.liga) tags.push(`<span class="mb-tag">🏆 ${esc(e.liga)}</span>`);
  if(e.hora) tags.push(`<span class="mb-tag">🕐 ${esc(e.hora)}</span>`);
  if(e.fecha) tags.push(`<span class="mb-tag">📅 ${esc(e.fecha)}</span>`);
  if(e.status==='live') tags.push(`<span class="mb-tag" style="color:var(--live)"><span class="dot"></span>EN VIVO</span>`);
  document.getElementById('mMeta').innerHTML=tags.join('');
  const n=e.channels.length;
  const servidorMap={
    'transmisiones':'SERVIDOR 1','marcadores':'SERVIDOR 1',
    'e1link':'SERVIDOR 1','ellink':'SERVIDOR 1',
    'transmisiones2':'SERVIDOR 2','rereyano':'SERVIDOR 2','golazolvhd':'SERVIDOR 2',
    'transmisiones3':'SERVIDOR 3','voodc':'SERVIDOR 3',
    'transmisiones4':'SERVIDOR 4','ftvhd':'SERVIDOR 4',
    'transmisiones5':'SERVIDOR 5','donromans':'SERVIDOR 5',
    'transmisiones6':'SERVIDOR 6',
    'transmisiones7':'SERVIDOR 7',
    'transmisiones8':'SERVIDOR 8',
  };
  let cardsHtml='';
  if(n>0){
    e.channels.forEach((c,i)=>{
      const num=i+1;
      const rawType=(c.src||c.tipoAPI||c.fuente||'').toLowerCase();
      const apiType=servidorMap[rawType]||`SERVIDOR ${num}`;
      const ping=Math.floor(Math.random()*38)+5;
      const pingCls=ping<20?'sv-ping-fast':ping<35?'sv-ping-medium':'sv-ping-slow';
      const delay=(i*55)+'ms';
      const feat=i===0?'sv-card-featured':'';
      const numLbl=String(num).padStart(2,'0');
      const safeName=(c.name||`Servidor ${num}`).replace(/'/g,"\\'");
      const safeTitle=e.titulo.replace(/'/g,"\\'");
      const safeUrl=(c.url||'').replace(/'/g,"\\'");
      cardsHtml+=`
        <div class="sv-card ${feat}" style="animation-delay:${delay}" onclick="playStream(${i})">
          <div class="sv-num">${numLbl}<div class="sv-online"></div></div>
          <div class="sv-body">
            <div class="sv-name">${esc(c.name||`Servidor ${num}`)}</div>
            <div class="sv-tags">
              <span class="sv-tag">${apiType}</span>
              <span class="sv-tag sv-tag-quality">${c.quality||'HD PREMIUM'}</span>
              <span class="sv-ping ${pingCls}">${ping}ms</span>
            </div>
            <div class="sv-wave"><span></span><span></span><span></span><span></span><span></span></div>
          </div>
          <div class="sv-copy" title="Copiar link" onclick="event.stopPropagation();svCopy(this,'${safeUrl}')">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
          </div>
          <div class="sv-play">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          </div>
        </div>`;
    });
  }else{
    cardsHtml=`<div class="sv-empty"><div class="sv-empty-icon">📡</div><p class="sv-empty-text">No se encontraron señales activas.<br>Intenta de nuevo en unos momentos.</p></div>`;
  }
  document.getElementById('mChList').innerHTML=`
    <div class="sv-wrapper">
      <div class="sv-meta">
        <span class="sv-live-dot"></span>
        <span class="sv-live-label">Señales disponibles</span>
        <span class="sv-count-pill">${n} NODO${n!==1?'S':''}</span>
      </div>
      <p class="sv-hint">Selecciona una señal para ver el partido</p>
      <div class="sv-list">${cardsHtml}</div>
      <div class="sv-footer">
        <div class="sv-footer-waves"><span></span><span></span><span></span><span></span></div>
        <span class="sv-footer-text">Conexión cifrada y optimizada</span>
      </div>
    </div>`;
  openModal('modalChannels');
}

function playStream(chIdx){
  if(!currentEvent) return;const ch=currentEvent.channels[chIdx];if(!ch) return;
  currentStreamUrl=ch.url;
  document.getElementById('mPlayerTitle').textContent=ch.name;
  document.getElementById('mChName').textContent=currentEvent.titulo;
  const iframe=document.getElementById('playerIframe');
  const loading=document.getElementById('pLoading');const error=document.getElementById('pError');
  loading.classList.remove('hi');error.classList.remove('sh');iframe.src='';
  clearTimeout(loadTimer);
  loadTimer=setTimeout(()=>{
    iframe.src=ch.url;
    loadTimer=setTimeout(()=>loading.classList.add('hi'),12000);
  },200);
  iframe.onload=()=>{loading.classList.add('hi');error.classList.remove('sh')};
  iframe.onerror=()=>{loading.classList.add('hi');error.classList.add('sh')};
  openModal('modalPlayer');
}
function svCopy(el,url){
  if(!url) return;
  navigator.clipboard.writeText(url).then(()=>{
    el.classList.add('copied');
    setTimeout(()=>el.classList.remove('copied'),1800);
  }).catch(()=>{});
}
function backToCh(){document.getElementById('playerIframe').src='';clearTimeout(loadTimer);closeModal('modalPlayer')}
function openInTab(){if(currentStreamUrl) window.open(currentStreamUrl,'_blank','noopener')}
function openModal(id){document.body.classList.add('modal-open');document.getElementById(id).classList.add('open')}
function closeModal(id){
  document.getElementById(id).classList.remove('open');
  if(!document.querySelector('.backdrop.open')) document.body.classList.remove('modal-open');
  if(id==='modalPlayer'){document.getElementById('playerIframe').src='';clearTimeout(loadTimer)}
}
function onBdClick(e,id){if(e.target.id===id) closeModal(id)}
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeModal('modalPlayer');closeModal('modalChannels')}});
document.getElementById('searchInput').addEventListener('input',renderAll);
/* ─── AUTO LOGO LOADER ─── */
const pendingLogos = new Map(); // teamName → Set of img element IDs

function logoElWithId(url, name, sport, small, elId) {
  const sz = small ? 32 : 36;
  const fb = `<div class="team-logo-fb" id="${elId}-fb" style="width:${sz}px;height:${sz}px">${sportIcon(sport)}</div>`;
  if (!url || url.startsWith('data:') || url.length < 10) {
    // Queue for async logo lookup
    if (name && name.trim()) {
      if (!pendingLogos.has(name)) pendingLogos.set(name, []);
      pendingLogos.get(name).push({ elId, sz, sport });
    }
    return fb;
  }
  return `<img class="team-logo" id="${elId}" style="width:${sz}px;height:${sz}px" src="${esc(url)}" alt="${esc(name)}" loading="lazy" data-sport="${esc(sport||'')}" onerror="imgErr(this,'team-logo-fb')">`;
}

async function loadPendingLogos() {
  // Collect all unique team names currently missing logos in the DOM
  const missing = new Map();
  document.querySelectorAll('.team-logo-fb[data-team-name]').forEach(el => {
    const n = el.getAttribute('data-team-name');
    if(n && !missing.has(n)) missing.set(n, el.getAttribute('data-sport')||'');
  });
  if(!missing.size) return;
  const teams = [...missing.entries()];
  // Batch 6 at a time
  for(let i=0; i<teams.length; i+=6){
    await Promise.all(teams.slice(i,i+6).map(async([name,sport])=>{
      try{
        const r=await fetch(`/api/team-logo?team=${encodeURIComponent(name)}`);
        const data=await r.json();
        if(!data.url) return;
        document.querySelectorAll(`.team-logo-fb[data-team-name="${CSS.escape(name)}"]`).forEach(el=>{
          if(!el.parentNode) return;
          const img=new Image();
          img.className='team-logo';
          img.src=data.url;
          img.alt=name;
          img.style.cssText=`width:${el.getAttribute('data-sz')||36}px;height:${el.getAttribute('data-sz')||36}px;border-radius:8px;object-fit:contain;background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.12);padding:3px;`;
          img.onerror=()=>{};
          img.onload=()=>el.parentNode&&el.parentNode.replaceChild(img,el);
        });
      }catch(e){}
    }));
  }
}

setInterval(loadAll, 5*60*1000);
loadAll().then(()=>setTimeout(loadPendingLogos, 800));
